/* ============ ALAP: IndexedDB tároló ============ */
const idb={db:null,
 open(){return new Promise((res,rej)=>{const r=indexedDB.open('rszapp',1);
  r.onupgradeneeded=e=>{const d=e.target.result;
   if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');
   if(!d.objectStoreNames.contains('photos'))d.createObjectStore('photos');};
  r.onsuccess=e=>{idb.db=e.target.result;res()};r.onerror=()=>rej(r.error);})},
 get(st,k){return new Promise((res,rej)=>{const t=idb.db.transaction(st).objectStore(st).get(k);
  t.onsuccess=()=>res(t.result);t.onerror=()=>rej(t.error)})},
 set(st,k,v){return new Promise((res,rej)=>{const t=idb.db.transaction(st,'readwrite').objectStore(st).put(v,k);
  t.onsuccess=()=>res();t.onerror=()=>rej(t.error)})},
 del(st,k){return new Promise((res,rej)=>{const t=idb.db.transaction(st,'readwrite').objectStore(st).delete(k);
  t.onsuccess=()=>res();t.onerror=()=>rej(t.error)})},
 keys(st){return new Promise((res,rej)=>{const t=idb.db.transaction(st).objectStore(st).getAllKeys();
  t.onsuccess=()=>res(t.result);t.onerror=()=>rej(t.error)})}};

/* Fix, minden eszközön azonos beépített admin fiók — a jelszó a forráskódból nem
 * fejthető vissza (csak a sózott PBKDF2-hash van itt, 60 000 iteráció). Ez garantálja,

const BUILTIN_ADMIN_ID='admin-builtin';
const BUILTIN_ADMIN={id:BUILTIN_ADMIN_ID,name:'Admin',username:'admin',email:'',
 salt:'rsz-admin-fixed-9f31ac',
 passHash:'807e00789b5a1bebf896e5b1644180fe0a53f0796e494d2acf843e909db24070',
 algo:'pbkdf2',iter:60000,role:'admin',dropboxFolder:'',active:true,updatedAt:0};
function ensureBuiltinAdmin(){if(!S.users)S.users=[];
 if(!S.users.some(u=>u.id===BUILTIN_ADMIN_ID)){S.users.push({...BUILTIN_ADMIN});markDirty()}}
/* 'admin' felhasználónév fenntartva a fix beépített fióknak — bárhonnan (GitHub fiokok.json
 * VAGY Dropbox kozos.json) érkező, ettől eltérő 'admin' bejegyzést eldobjuk beolvasáskor. */
function reserveBuiltinAdmin(list){return(list||[]).filter(u=>u.id===BUILTIN_ADMIN_ID||String(u.username||'').toLowerCase()!=='admin')}
async function hashPass(pw,salt){const b=await crypto.subtle.digest('SHA-256',
 new TextEncoder().encode(salt+'|'+pw));
 return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function pbkdf2(pw,salt,iter){const km=await crypto.subtle.importKey('raw',
 new TextEncoder().encode(pw),'PBKDF2',false,['deriveBits']);
 const bits=await crypto.subtle.deriveBits({name:'PBKDF2',hash:'SHA-256',
  salt:new TextEncoder().encode(salt),iterations:iter},km,256);
 return Array.from(new Uint8Array(bits)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function makeHash(pw,salt){return pbkdf2(pw,salt,60000)}
async function verifyUser(u,pw){
 if(u.algo==='pbkdf2')return(await pbkdf2(pw,u.salt,u.iter||60000))===u.passHash;
 return(await hashPass(pw,u.salt))===u.passHash}

 }catch(e){}return false}

 <textarea id="d_inote" ${dis} oninput="dSet('${sid}','${did}','internalNote',this.value)">${esc(d.internalNote)}</textarea>
 <label class="fld">Mennyiség (db)</label>

  <button class="btn" style="flex:0 0 64px;margin:0;font-size:1.4rem" ${dis} onclick="qtyStep('${sid}','${did}',-1)">−</button>

  <button class="btn" style="flex:0 0 64px;margin:0;font-size:1.4rem" ${dis} onclick="qtyStep('${sid}','${did}',1)">＋</button></div>
 <label class="fld">Méret (mm)</label>
 <div id="d_sugg">${suggHtml(sid,did)}</div>
 <div class="row">
  <input type="text" id="d_sh" placeholder="hossz" value="${esc(d.sizeH)}" ${dis} oninput="dSet('${sid}','${did}','sizeH',this.value)">
  <input type="text" id="d_sw" placeholder="szélesség" value="${esc(d.sizeW)}" ${dis} oninput="dSet('${sid}','${did}','sizeW',this.value)">
  <input type="text" id="d_sm" placeholder="magasság" value="${esc(d.sizeM)}" ${dis} oninput="dSet('${sid}','${did}','sizeM',this.value)"></div>
 <hr class="hr"><div class="eyebrow">Fotók</div>
 <div class="thumbs" id="d_thumbs"></div>
 <input type="file" id="d_file" accept="image/*" capture="environment" style="display:none"
  onchange="addPhoto('${sid}','${did}',this)">
 ${locked?'':`<div class="bottombar"><div class="inner">
  <button class="btn danger" style="flex:0 0 auto;width:auto;padding:14px 12px" onclick="delDmg('${sid}','${did}')">🗑</button>
  <button class="btn" onclick="dDone('${sid}','${did}')">Kész ✓</button>
  <button class="btn primary" onclick="dDoneNext('${sid}','${did}')">＋ Új hiba felvétele</button></div></div>`}`;
 renderThumbs(sid,did)}
function manuChips(sid,did,d){const dis=sess(sid).status==='locked';
 return sortedManus().map(m=>`<button class="chip ${d.manufacturerId===m.id?'on':''}"
  ${dis?'disabled':''} onclick="dManu('${sid}','${did}','${m.id}')">${esc(m.name)}</button>`).join('')+
 (dis?'':`<button class="chip count" onclick="dManuNew('${sid}','${did}')">＋ új gyártó</button>`)}
function mtxBtns(sid,did,d){const dis=sess(sid).status==='locked';
 return MATRIX.map(m=>`<button class="${d.matrix[m.k]?'on':''}" ${dis?'disabled':''}
  onclick="dMtx('${sid}','${did}','${m.k}')">${m.label}</button>`).join('')}
function klassBtns(sid,did,d){const dis=sess(sid).status==='locked'?'disabled':'';
 return `<button class="z ${d.klass==='zold'?'on':''}" ${dis} onclick="dKlass('${sid}','${did}','zold')">Zöld</button>
 <button class="s ${d.klass==='sarga'?'on':''}" ${dis} onclick="dKlass('${sid}','${did}','sarga')">Sárga</button>
 <button class="p ${d.klass==='piros'?'on':''}" ${dis} onclick="dKlass('${sid}','${did}','piros')">Piros</button>`}
function rtypeChips(sid,did,d){const dis=sess(sid).status==='locked';
 return RACK_TYPES.map(t=>`<button class="chip ${d.rackType===t.name?'on':''}" ${dis?'disabled':''}
  onclick="dRType('${sid}','${did}',this.textContent)">${t.name}</button>`).join('')}
function taxoBlock(sid,did,d){if(!d.rackType)return '<div class="mut small">Előbb válaszd ki az állvány típusát.</div>';
 const dis=sess(sid).status==='locked';
 const elems=taxoElems(d.rackType);
 let h='<div class="eyebrow" style="margin-top:14px">Mi sérült? *</div><div class="chips">'+
  elems.map(e=>`<button class="chip ${d.element===e?'on':''}" ${dis?'disabled':''}
   onclick="dElem('${sid}','${did}',this.textContent)">${esc(e)}</button>`).join('')+'</div>';
 if(d.element){const opts=taxoOf(d.rackType).filter(o=>o[0]===d.element&&o[1]);
  if(opts.length){h+='<div class="eyebrow" style="margin-top:10px">Sérülés és javítás módja *</div><div class="mtx">'+
   opts.map((o,i)=>`<button class="${d.damage===o[1]&&d.repair===o[2]?'on':''}" ${dis?'disabled':''}
    onclick="dOpt('${sid}','${did}',${i})"><b>${esc(o[1])}</b><br>→ ${esc(o[2])}</button>`).join('')+'</div>'}
  else h+='<div class="mut small">Egyedi elem — írd le a sérülést a Megjegyzés / Belső megjegyzés mezőben.</div>'}
 if(d.material||d.measure){h+='<div class="card" style="border-color:var(--brand)">'+
  (d.material&&d.material.toLowerCase()!=='nincs'?'<div class="small"><b>Anyagigény:</b> '+esc(d.material)+'</div>':'')+
  (d.measure?'<div class="small" style="margin-top:4px"><b>Felmérendő:</b> '+esc(d.measure)+'</div>':'')+'</div>'}
 return h}
function dRType(sid,did,name){const d=dGet(sid,did);d.rackType=name;
 d.element='';d.damage='';d.repair='';d.material='';d.measure='';d.updatedAt=now();markDirty();
 document.getElementById('d_rtype').innerHTML=rtypeChips(sid,did,d);
 document.getElementById('d_taxo').innerHTML=taxoBlock(sid,did,d)}
function dElem(sid,did,e){const d=dGet(sid,did);d.element=e;
 d.damage='';d.repair='';d.material='';d.measure='';d.updatedAt=now();markDirty();
 document.getElementById('d_taxo').innerHTML=taxoBlock(sid,did,d);
 const sg=document.getElementById('d_sugg');if(sg)sg.innerHTML=suggHtml(sid,did)}
function dOpt(sid,did,i){const d=dGet(sid,did);
 const o=taxoOf(d.rackType).filter(x=>x[0]===d.element&&x[1])[i];if(!o)return;
 d.damage=o[1];d.repair=o[2];d.material=o[3];d.measure=o[4];d.updatedAt=now();markDirty();
 document.getElementById('d_taxo').innerHTML=taxoBlock(sid,did,d)}
function dGet(sid,did){return sess(sid).damages.find(x=>x.id===did)}
function dSet(sid,did,k,v){const d=dGet(sid,did);d[k]=v;d.updatedAt=now();sess(sid).updatedAt=now();markDirty()}
function dNote(sid,did,t){const d=dGet(sid,did);d.note=d.note?(d.note+' '+t):t;d.updatedAt=now();
 document.getElementById('d_note').value=d.note;markDirty()}
const CSERE_KEYS=['talplemez','keretCsere','gerElsoCsere','gerHatsoCsere','tulCsere'];
function dMtx(sid,did,k){const d=dGet(sid,did);d.matrix[k]=!d.matrix[k];d.updatedAt=now();
 if(d.matrix[k]&&CSERE_KEYS.includes(k)&&d.klass!=='piros'){d.klass='sarga';
  const kb=document.getElementById('d_klass');if(kb)kb.innerHTML=klassBtns(sid,did,d)}
 markDirty();document.getElementById('d_mtx').innerHTML=mtxBtns(sid,did,d)}
function dKlass(sid,did,k){const d=dGet(sid,did);d.klass=k;d.updatedAt=now();markDirty();
 document.getElementById('d_klass').innerHTML=klassBtns(sid,did,d)}
function dManu(sid,did,mid){const d=dGet(sid,did);d.manufacturerId=mid;d.updatedAt=now();
 touchManu(mid);markDirty();document.getElementById('d_manu').innerHTML=manuChips(sid,did,d);
 const sg=document.getElementById('d_sugg');if(sg)sg.innerHTML=suggHtml(sid,did)}
function dManuNew(sid,did){const n=prompt('Gyártó neve:');if(!n)return;
 const m={id:uid(),name:n.trim(),count:1,updatedAt:now()};S.manufacturers.push(m);
 dManu(sid,did,m.id)}
function dSave(sid,did){const d=dGet(sid,did);
 if(!d.locationCode.trim()){alert('A tárhely azonosító megadása kötelező.');return false}
 if(!d.rackType){alert('Válaszd ki az állvány típusát.');return false}
 if(!d.element){alert('Válaszd ki, mi sérült.');return false}
 if(!d.damage&&taxoOf(d.rackType).some(o=>o[0]===d.element&&o[1])){
  alert('Válaszd ki a sérülés és javítás módját.');return false}
 if(!d.klass){alert('Válaszd ki a sérülési osztályt (Zöld / Sárga / Piros).');return false}
 delete d.pre;
 const c=cust(sess(sid).customerId);
 let loc=c.locations.find(l=>l.warehouseId===d.warehouseId&&l.code===d.locationCode.trim());
 if(!loc){loc={id:uid(),warehouseId:d.warehouseId,code:d.locationCode.trim(),
  row:d.row,level:d.level,manufacturerId:d.manufacturerId,updatedAt:now()};c.locations.push(loc)}
 else{loc.row=d.row;loc.level=d.level;if(d.manufacturerId)loc.manufacturerId=d.manufacturerId;loc.updatedAt=now()}
 c.updatedAt=now();markDirty();return true}
function dDone(sid,did){const d=dGet(sid,did);
 if(dSave(sid,did))go('wh/'+sid+'/'+d.warehouseId)}
function dDoneNext(sid,did){const d=dGet(sid,did);
 if(dSave(sid,did))newDmg(sid,d.warehouseId)}
function delDmg(sid,did){if(!confirm('Biztosan törlöd ezt a bejegyzést?'))return;
 const s=sess(sid);const d=dGet(sid,did);const wid=d.warehouseId;
 d.photos.forEach(p=>idb.del('photos',p));
 s.damages=s.damages.filter(x=>x.id!==did);s.updatedAt=now();markDirty();go('wh/'+sid+'/'+wid)}
function dLocHint(sid,did,code){const s=sess(sid);const c=cust(s.customerId);const d=dGet(sid,did);
 const loc=c.locations.find(l=>l.warehouseId===d.warehouseId&&l.code===code.trim());
 if(loc){if(loc.row){d.row=loc.row;document.getElementById('d_row').value=loc.row}
  if(loc.level!=null){d.level=loc.level;document.getElementById('d_level').value=loc.level}
  if(loc.manufacturerId){d.manufacturerId=loc.manufacturerId;
   document.getElementById('d_manu').innerHTML=manuChips(sid,did,d)}
  d.updatedAt=now();markDirty()}}

/* ============ FOTÓK ============ */
async function renderThumbs(sid,did){const d=dGet(sid,did);const box=document.getElementById('d_thumbs');
 if(!box)return;const locked=sess(sid).status==='locked';let h='';
 for(const pid of d.photos){const p=await idb.get('photos',pid);
  if(p)h+=`<div style="position:relative;display:inline-block"><img class="th" src="${p.thumb}"
   onclick="viewPhoto('${sid}','${did}','${pid}')">${p.internal?'<span style="position:absolute;top:3px;left:3px;background:var(--yellow);color:#191300;font-size:.55rem;font-weight:800;padding:1px 4px;border-radius:4px;pointer-events:none">BELSŐ</span>':''}</div>`}
 if(!locked)h+=`<button class="add" title="Beépített kamera" onclick="openCam('${sid}','${did}')">📷</button>
  <button class="add" title="Galéria / rendszerkamera" onclick="document.getElementById('d_file').click()">🖼</button>`;
 box.innerHTML=h}
function addPhoto(sid,did,inp){const f=inp.files[0];if(!f)return;inp.value='';
 const img=new Image();const url=URL.createObjectURL(f);
 img.onload=async()=>{URL.revokeObjectURL(url);
  const full=scaleImg(img,1600,.82),thumb=scaleImg(img,240,.7);
  const pid=uid();await idb.set('photos',pid,{id:pid,full,thumb,at:now()});
  const d=dGet(sid,did);d.photos.push(pid);d.updatedAt=now();markDirty();renderThumbs(sid,did)};
 img.src=url}
function scaleImg(img,max,q){const r=Math.min(1,max/Math.max(img.width,img.height));
 const cv=document.createElement('canvas');cv.width=Math.round(img.width*r);cv.height=Math.round(img.height*r);
 cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);return cv.toDataURL('image/jpeg',q)}
async function viewPhoto(sid,did,pid){const p=await idb.get('photos',pid);
 const locked=sess(sid).status==='locked';
 modal(`<img class="big" src="${p.full}">
  ${p.internal?'<div class="badge s" style="margin:8px 0">BELSŐ FOTÓ — a jegyzőkönyvben nem szerepel, Dropboxba szinkronizálódik</div>':''}
  ${locked?'':`<button class="btn" onclick="togglePhotoInternal('${sid}','${did}','${pid}')">${p.internal?'Visszaállítás normál fotóvá':'📌 Megjelölés BELSŐ fotóként (nem kerül a jegyzőkönyvbe)'}</button>
  <button class="btn danger" onclick="delPhoto('${sid}','${did}','${pid}')">Fotó törlése</button>`}
  <button class="btn" onclick="closeModal()">Bezárás</button>`)}
async function togglePhotoInternal(sid,did,pid){const p=await idb.get('photos',pid);
 p.internal=!p.internal;await idb.set('photos',pid,p);
 const d=dGet(sid,did);d.updatedAt=now();markDirty();closeModal();
 renderThumbs(sid,did);viewPhoto(sid,did,pid)}
async function delPhoto(sid,did,pid){if(!confirm('Törlöd a fotót?'))return;
 await idb.del('photos',pid);const d=dGet(sid,did);
 d.photos=d.photos.filter(x=>x!==pid);d.updatedAt=now();markDirty();closeModal();renderThumbs(sid,did)}
function modal(html){document.getElementById('modals').innerHTML=
 `<div class="modal" onclick="if(event.target===this)closeModal()"><div class="sheet">${html}</div></div>`}
function closeModal(){stopScan();stopCam();document.getElementById('modals').innerHTML=''}

let qrScanner=null;
function openScan(cb){if(typeof Html5Qrcode==='undefined'){
  alert('A kódolvasó modul nem érhető el (első használathoz internet szükséges). Írd be kézzel a kódot.');return}
 modal(`<h2>Kód beolvasása</h2><div class="mut small">QR-kód vagy vonalkód</div><div id="qrbox"></div>
  <button class="btn" onclick="closeModal()">Mégse</button>`);
 qrScanner=new Html5Qrcode('qrbox');
 qrScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:180}},
  txt=>{const v=txt;stopScan();closeModal();cb(v)},()=>{})
  .catch(e=>{alert('Kamera nem indítható: '+e);closeModal()})}
function stopScan(){if(qrScanner){try{qrScanner.stop().catch(()=>{})}catch(e){};qrScanner=null}}

function vClose(sid){const s=sess(sid);if(!s){go('home');return}
 const c=cust(s.customerId);const st=sessStats(s);
 const result=(st.p||st.y)?'NEM FELELT MEG':'MEGFELELT';
 const next=new Date(s.date);next.setFullYear(next.getFullYear()+1);
 const missing=s.damages.filter(d=>!d.locationCode||!d.klass).length;
 const app=document.getElementById('app');
 app.innerHTML=hdr('Lezárás',esc(c.name)+' · '+fmtD(s.date),'session/'+sid)+`
 <div class="card"><div class="eyebrow">Összesítés</div>
  <div class="stat"><span class="badge p">${st.p} piros</span><span class="badge s">${st.y} sárga</span>
  <span class="badge z">${st.z} zöld</span><span class="badge grey">${s.damages.length} bejegyzés · ${s.warehouses.length} raktár</span></div>
  ${missing?`<div style="color:var(--red)">⚠ ${missing} bejegyzésből hiányzik a tárhelykód vagy a besorolás!</div>`:''}
  <hr class="hr"><div class="eyebrow">Az állványrendszerek állapota</div>
  <h1 style="color:${result==='MEGFELELT'?'var(--green)':'var(--red)'}">${result}</h1>
  <div class="mut small">az MSZ EN 15635 szabványban előírt követelményeknek${result==='MEGFELELT'?'':', a hibajegyzékben feltüntetett tárhelyeken'}.</div>
  <label class="fld">Következő felülvizsgálat legkésőbb</label>
  <input type="date" id="c_next" value="${next.toISOString().slice(0,10)}"></div>
 <div class="card"><div class="eyebrow">Vizsgáló aláírása (${esc(inspNameOf(s))})</div>
  <canvas class="sig" id="sig1"></canvas>
  <button class="btn small" onclick="clearSig('sig1')">Törlés</button></div>
 <div class="card"><div class="eyebrow">Ügyfél képviselőjének aláírása</div>
  <label class="fld">Átvevő neve</label><input type="text" id="c_client" value="${esc(s.contactName||'')}">
  <canvas class="sig" id="sig2"></canvas>
  <button class="btn small" onclick="clearSig('sig2')">Törlés</button></div>
 <div class="bottombar"><div class="inner">
  <button class="btn primary" onclick="doClose('${sid}')">Jegyzőkönyv lezárása ✓</button></div></div>`;
 initSig('sig1');initSig('sig2');
 const ou=(S.users||[]).find(u=>u.id===s.ownerId);
 if(ou&&ou.signature)loadSigImage('sig1',ou.signature)}
const sigDrawn={};
function initSig(id){const cv=document.getElementById(id);
 cv.width=cv.offsetWidth*2;cv.height=cv.offsetHeight*2;
 const ctx=cv.getContext('2d');ctx.scale(2,2);ctx.lineWidth=2;ctx.lineCap='round';ctx.strokeStyle='#111';
 sigDrawn[id]=false;let draw=false,lx=0,ly=0;
 const pos=e=>{const r=cv.getBoundingClientRect();return[e.clientX-r.left,e.clientY-r.top]};
 cv.onpointerdown=e=>{draw=true;[lx,ly]=pos(e);cv.setPointerCapture(e.pointerId)};
 cv.onpointermove=e=>{if(!draw)return;const[x,y]=pos(e);
  ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();[lx,ly]=[x,y];sigDrawn[id]=true};
 cv.onpointerup=()=>draw=false}
function clearSig(id){const cv=document.getElementById(id);
 cv.getContext('2d').clearRect(0,0,cv.width,cv.height);sigDrawn[id]=false}
function loadSigImage(id,dataUrl){const cv=document.getElementById(id);if(!cv||!dataUrl)return;
 const im=new Image();im.onload=()=>{cv.getContext('2d').drawImage(im,0,0,cv.offsetWidth,cv.offsetHeight);
  sigDrawn[id]=true};im.src=dataUrl}
function doClose(sid){const s=sess(sid);
 if(!sigDrawn['sig1']||!sigDrawn['sig2']){alert('Mindkét aláírás megadása kötelező a lezáráshoz.');return}
 const cn=document.getElementById('c_client').value.trim();
 if(!cn){alert('Az átvevő nevének megadása kötelező.');return}
 const st=sessStats(s);
 s.result=(st.p||st.y)?'NEM FELELT MEG':'MEGFELELT';
 s.nextDate=document.getElementById('c_next').value;
 s.signatures={inspector:document.getElementById('sig1').toDataURL('image/png'),
  client:document.getElementById('sig2').toDataURL('image/png'),clientName:cn};
 s.status='locked';s.closedAt=now();s.updatedAt=now();markDirty();saveState();
 if(navigator.onLine&&S.settings.dropboxRefresh&&S.settings.autoSync)syncNow(true);
 go('report/'+sid)}

/* --- Excel --- */
function xRow(s,d){
 return[d.locationCode,d.row,d.level,d.rackType||'',manuName(d.manufacturerId),
  d.element||'',d.damage||'',d.repair||'',
  d.klass==='piros'?'x':'',d.klass==='sarga'?'x':'',d.klass==='zold'?'x':'',d.note]}
const XB={style:'thin',color:{rgb:'FF808080'}};
function xst(fill,o){o=o||{};return{
 fill:fill?{patternType:'solid',fgColor:{rgb:fill}}:undefined,
 font:{name:'Arial',sz:o.sz||9,bold:!!o.b,color:{rgb:o.w?'FFFFFFFF':'FF000000'}},
 alignment:{vertical:'center',horizontal:o.c?'center':'left',wrapText:true},
 border:{top:XB,bottom:XB,left:XB,right:XB}}}
function makeXlsx(sid,internal){if(!licOk2()){licBlock();return}
 const s=sess(sid);const c=cust(s.customerId);
 if(typeof XLSX==='undefined'){alert('Az Excel-modul még nem töltődött be (első használathoz internet szükséges).');return}
 const head=['Tárhely azonosító','Sor','Szint','Állvány típusa','Gyártó',
  'Sérült elem','Sérülés','Javítás módja','Piros','Sárga','Zöld','Megjegyzés'];
 if(internal)head.push('Anyagigény','Felmérendő','Belső megjegyzés','Mennyiség (db)','Méret (h×sz×m)');
 const P=8,SA=9,Z=10;
 const rows=[['Állványrendszer felülvizsgálati hibajegyzék'],
  ['Megrendelő: '+c.name],['Felülvizsgálat dátuma: '+fmtD(s.date)],
  ['Telephely: '+(c.address||'')],[],head];
 const meta=['title','meta','meta','meta','blank','head'];
 for(const w of s.warehouses){const ds=s.damages.filter(d=>d.warehouseId===w.id);
  const whRow=[w.name];for(let i=1;i<head.length;i++)whRow.push('');
  if(!ds.length)whRow[11]=s.whOk[w.id]?'Rendben!':'';
  rows.push(whRow);meta.push(!ds.length&&s.whOk[w.id]?'whok':'wh');
  for(const d of ds){const r=[d.locationCode,d.row,d.level,d.rackType||'',manuName(d.manufacturerId),
   d.element||'',d.damage||'',d.repair||'',
   d.klass==='piros'?'x':'',d.klass==='sarga'?'x':'',d.klass==='zold'?'x':'',d.note];
   if(internal)r.push(d.material||'',d.measure||'',d.internalNote,d.qty,
    [d.sizeH,d.sizeW,d.sizeM].filter(Boolean).join(' × '));
   rows.push(r);meta.push(d.klass||'data')}}
 const ws=XLSX.utils.aoa_to_sheet(rows);
 const widths=[18,5,5,15,12,15,17,19,4.5,4.5,4.5,30];
 if(internal)widths.push(20,24,26,7,13);
 ws['!cols']=widths.map(w=>({wch:w}));
 ws['!rows']=rows.map((r,i)=>({hpt:meta[i]==='head'?30:meta[i]==='title'?22:16}));
 for(let ri=0;ri<rows.length;ri++){const m=meta[ri];
  for(let ci=0;ci<head.length;ci++){
   const addr=XLSX.utils.encode_cell({r:ri,c:ci});if(!ws[addr])ws[addr]={t:'s',v:''};
   const cell=ws[addr];
   if(m==='title')cell.s=ci?undefined:{font:{name:'Arial',sz:14,bold:true}};
   else if(m==='meta')cell.s=ci?undefined:{font:{name:'Arial',sz:10,bold:true}};
   else if(m==='blank')continue;
   else if(m==='head'){
    const f=ci===P?'FFFF0000':ci===SA?'FFFFFF00':ci===Z?'FF00B050':'FF1F4E79';
    cell.s=xst(f,{b:true,w:ci!==SA,c:true,sz:9})}
   else if(m==='wh'||m==='whok')cell.s=xst(m==='whok'?'FFC9E8C9':'FFD6E4F0',{b:true,sz:10});
   else{const marked=cell.v==='x';
    let f;if(ci===P)f=marked?'FFFF0000':'FFFFA7A7';
    else if(ci===SA)f=marked?'FFFFFF00':'FFFFE4AF';
    else if(ci===Z)f=marked?'FF00B050':'FFD2EEC4';
    cell.s=xst(f,{b:marked,w:marked&&ci!==SA,c:ci<3&&ci>0||ci>=P&&ci<=Z||ci===15})}}}
 const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Hibajegyzék');
 if(internal){const ord=orderSummary(s);
  const oRows=[['Rendelési összesítő — '+c.name+' — '+fmtD(s.date)],[],
   ['Elem — javítás','Anyagigény','Gyártó','Méret (mm)','Belső megjegyzés','Mennyiség (db)','Helyek']];
  for(const r of ord)oRows.push([r.elem,r.anyag,r.gyarto,r.meret,r.cikk,r.db,r.helyek.join(', ')]);
  oRows.push([],['Összesen','','','','',ord.reduce((a,r)=>a+r.db,0),'']);
  const ws2=XLSX.utils.aoa_to_sheet(oRows);
  ws2['!cols']=[{wch:26},{wch:24},{wch:12},{wch:14},{wch:26},{wch:10},{wch:40}];
  for(let ci=0;ci<7;ci++){const a=XLSX.utils.encode_cell({r:2,c:ci});
   if(ws2[a])ws2[a].s=xst('FF1F4E79',{b:true,w:true,c:true})}
  XLSX.utils.book_append_sheet(wb,ws2,'Rendelés')}
 const fname=`Felulvizsgalat_${s.date}_${c.name.replace(/[^\wÁÉÍÓÖŐÚÜŰáéíóöőúüű ]/g,'').replace(/ /g,'_')}${internal?'_BELSO':''}.xlsx`;
 const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
 shareOrDownload(new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),fname)}
async function shareOrDownload(blob,fname){const file=new File([blob],fname,{type:blob.type});
 if(navigator.canShare&&navigator.canShare({files:[file]})){
  try{await navigator.share({files:[file],title:fname});return}catch(e){if(e.name==='AbortError')return}}
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;a.click();
 setTimeout(()=>URL.revokeObjectURL(a.href),5000)}

/* a javítás jellegű megoldások (anyagigény nélkül) nem rendelendők */
function orderSummary(s){const map=new Map();
 for(const d of s.damages){if(!d.element)continue;
  const mat=(d.material||'').trim();
  if(!d.repair||!mat||mat.toLowerCase()==='nincs')continue;
  const size=[d.sizeH,d.sizeW,d.sizeM].filter(Boolean).join(' × ');
  const key=[d.element,d.repair,mat,manuName(d.manufacturerId),size,d.internalNote||''].join('|');
  const cur=map.get(key)||{elem:d.element+' — '+d.repair,anyag:mat,
   gyarto:manuName(d.manufacturerId),meret:size,cikk:d.internalNote||'',db:0,helyek:[]};
  cur.db+=Number(d.qty)||1;
  const w=s.warehouses.find(x=>x.id===d.warehouseId);
  cur.helyek.push((w?w.name+': ':'')+d.locationCode);
  map.set(key,cur)}
 return[...map.values()].sort((a,b)=>a.elem.localeCompare(b.elem,'hu'))}
function vOrder(sid){const s=sess(sid);if(!s){go('home');return}

 let xml=await zip.file('word/document.xml').async('string');

 const xesc=t=>String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
 for(const k in V){const val=xesc(V[k]).replace(/\n/g,'</w:t><w:br/><w:t xml:space="preserve">');
  xml=xml.split('&lt;&lt;'+k+'&gt;&gt;').join(val)}
 zip.file('word/document.xml',xml);
 const blob=await zip.generateAsync({type:'blob',

 shareOrDownload(blob,'Jegyzokonyv_fedlap_'+(b.key==='JH'?'JH_':'')+

/* ============ DROPBOX SZINKRON (PKCE OAuth, SDK nélkül) ============ */
function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf)))
 .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')}
async function dbxConnect(){const key=document.getElementById('dbxkey').value.trim();
 if(!key){alert('Add meg az App key-t.');return}
 S.settings.dropboxKey=key;S.settings.updatedAt=now();await saveState();
 const verifier=b64url(crypto.getRandomValues(new Uint8Array(48)));
 sessionStorage.dbxV=verifier;
 const challenge=b64url(await crypto.subtle.digest('SHA-256',new TextEncoder().encode(verifier)));
 const redirect=location.origin+location.pathname;
 location.href='https://www.dropbox.com/oauth2/authorize?client_id='+key+
  '&response_type=code&code_challenge='+challenge+'&code_challenge_method=S256'+
  '&token_access_type=offline&redirect_uri='+encodeURIComponent(redirect)}
async function dbxHandleRedirect(){const p=new URLSearchParams(location.search);
 const code=p.get('code');if(!code)return;
 history.replaceState(null,'',location.pathname);
 try{const r=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',
  headers:{'Content-Type':'application/x-www-form-urlencoded'},
  body:new URLSearchParams({code,grant_type:'authorization_code',
   client_id:S.settings.dropboxKey,code_verifier:sessionStorage.dbxV||'',
   redirect_uri:location.origin+location.pathname})});
  const j=await r.json();
  if(j.refresh_token){S.settings.dropboxRefresh=j.refresh_token;S.settings.updatedAt=now();
   await saveState();alert('Dropbox sikeresen összekapcsolva! ✓');syncNow(true)}
  else alert('Dropbox hiba: '+JSON.stringify(j))}catch(e){alert('Dropbox kapcsolódási hiba: '+e)}}
let dbxToken=null,dbxTokenExp=0;
async function dbxAccess(){if(dbxToken&&Date.now()<dbxTokenExp)return dbxToken;
 const r=await fetch('https://api.dropboxapi.com/oauth2/token',{method:'POST',
  headers:{'Content-Type':'application/x-www-form-urlencoded'},
  body:new URLSearchParams({grant_type:'refresh_token',
   refresh_token:S.settings.dropboxRefresh,client_id:S.settings.dropboxKey})});
 const j=await r.json();if(!j.access_token)throw new Error('token');
 dbxToken=j.access_token;dbxTokenExp=Date.now()+(j.expires_in-60)*1000;return dbxToken}
async function dbxUpload(path,content){const t=await dbxAccess();
 return fetch('https://content.dropboxapi.com/2/files/upload',{method:'POST',
  headers:{'Authorization':'Bearer '+t,'Content-Type':'application/octet-stream',
   'Dropbox-API-Arg':JSON.stringify({path,mode:'overwrite',mute:true})},body:content})}
async function dbxDownload(path){const t=await dbxAccess();
 const r=await fetch('https://content.dropboxapi.com/2/files/download',{method:'POST',
  headers:{'Authorization':'Bearer '+t,'Dropbox-API-Arg':JSON.stringify({path})}});
 if(!r.ok)return null;return r.text()}
async function dbxList(path){const t=await dbxAccess();
 const r=await fetch('https://api.dropboxapi.com/2/files/list_folder',{method:'POST',
  headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'},
  body:JSON.stringify({path})});
 if(!r.ok)return[];const j=await r.json();return(j.entries||[]).map(e=>e.name)}
function mergeById(local,remote){const map=new Map(local.map(o=>[o.id,o]));
 for(const r of remote){const l=map.get(r.id);
  if(!l||((r.updatedAt||0)>(l.updatedAt||0)))map.set(r.id,r)}
 return[...map.values()]}
let syncing=false;
function sessionsOfOwner(oid){return S.sessions.filter(s=>s.ownerId===oid)}
async function syncNow(silent){if(syncing||!S.settings.dropboxRefresh)return;
 if(!navigator.onLine){if(!silent)alert('Nincs internetkapcsolat. A szinkron a következő online állapotban lefut.');return}
 syncing=true;const chip=document.getElementById('syncchip');if(chip)chip.textContent='szinkron…';
 try{
  /* 1) Közös adatok: felhasználók, ügyfelek, gyártók, sablonok */
  const kzTxt=await dbxDownload('/kozos.json');
  if(kzTxt){try{const R=JSON.parse(kzTxt);
   S.users=mergeById(S.users||[],reserveBuiltinAdmin(R.users||[]));
   S.customers=mergeById(S.customers,R.customers||[]);
   S.manufacturers=mergeById(S.manufacturers,R.manufacturers||[]);
   if(Array.isArray(R.deleted)){const dm=new Map((S.deleted||[]).map(x=>[x.id,x]));
    for(const t of R.deleted)if(t&&t.id&&!dm.has(t.id))dm.set(t.id,t);S.deleted=[...dm.values()]}
   if(R.shared&&(R.shared.updatedAt||0)>(S.settings.updatedAt||0)){
    if(R.shared.noteTemplates)S.settings.noteTemplates=R.shared.noteTemplates;
    if(R.shared.templates)S.settings.templates=R.shared.templates;
    if(R.shared.company)S.settings.company=R.shared.company;
    S.settings.companyLine=R.shared.companyLine||S.settings.companyLine;
    S.settings.updatedAt=R.shared.updatedAt}}catch(e){}}
  const delIds=new Set((S.deleted||[]).map(x=>x.id));
  S.sessions=S.sessions.filter(x=>!delIds.has(x.id));
  await dbxUpload('/kozos.json',JSON.stringify({users:S.users,customers:S.customers,
   manufacturers:S.manufacturers,deleted:S.deleted||[],shared:{noteTemplates:S.settings.noteTemplates,
    templates:S.settings.templates,company:S.settings.company,
    companyLine:S.settings.companyLine,updatedAt:S.settings.updatedAt}}));
  /* frissen letöltött felhasználók után: bejelentkezés érvényesíthető */
  if(!CU){const suid=lsGet('rsz_uid');CU=(S.users||[]).find(u=>u.id===suid&&u.active!==false)||null}
  /* 2) Vizsgálatok felhasználónként, saját mappákban */
  const owners=new Set(S.sessions.map(s=>s.ownerId).filter(Boolean));
  if(CU){owners.add(CU.id);
   if(CU.role==='admin')for(const u of S.users)owners.add(u.id)}
  for(const oid of owners){const u=S.users.find(x=>x.id===oid);if(!u)continue;
   const base='/felhasznalok/'+userFolder(u);
   const remote=await dbxDownload(base+'/vizsgalatok.json');
   if(remote){try{const R=JSON.parse(remote);
    S.sessions=mergeById(S.sessions,(R.sessions||[]).filter(x=>!delIds.has(x.id)))}catch(e){}}
   const mine=sessionsOfOwner(oid);
   if(mine.length||((CU&&CU.id===oid)))
    await dbxUpload(base+'/vizsgalatok.json',JSON.stringify({sessions:mine}));
   /* fotók ehhez a felhasználóhoz */
   const needIds=new Set();
   for(const s of mine)for(const d of s.damages)for(const p of d.photos)needIds.add(p);
   if(needIds.size){const remoteP=new Set(await dbxList(base+'/fotok').catch(()=>[]));
    const localKeys=await idb.keys('photos');
    for(const k of needIds){
     if(localKeys.includes(k)){if(!remoteP.has(k+'.json')){
      const p=await idb.get('photos',k);
      if(p)await dbxUpload(base+'/fotok/'+k+'.json',JSON.stringify(p))}}
     else if(remoteP.has(k+'.json')){const t=await dbxDownload(base+'/fotok/'+k+'.json');
      if(t)await idb.set('photos',k,JSON.parse(t))}}}}
  S.lastSync=now();await saveState();
  if(!silent)alert('Szinkronizálás kész ✓');
 }catch(e){if(!silent)alert('Szinkron hiba: '+e)}
 syncing=false;if(chip)chip.textContent=navigator.onLine?'online':'offline';
 const h=(location.hash.slice(1)||'home');
 if(!CU||h==='home')render()}
window.addEventListener('online',()=>{if(S&&S.settings.autoSync&&S.settings.dropboxRefresh)syncNow(true);
 const c=document.getElementById('syncchip');if(c)c.textContent='online'});

setInterval(()=>{if(S&&navigator.onLine&&S.settings.autoSync&&S.settings.dropboxRefresh)syncNow(true)},5*60000);

/* --- méret/cikkszám javaslatok a korábbi hibákból --- */
function sizeSugg(sid,did){const s=sess(sid);const d=dGet(sid,did);if(!d)return[];
 const rel=[];
 for(const ss of S.sessions){if(ss.customerId!==s.customerId)continue;
  for(const x of ss.damages){if(x.id===d.id)continue;
   if(d.element&&x.element&&x.element!==d.element)continue;
   if(d.manufacturerId&&x.manufacturerId&&x.manufacturerId!==d.manufacturerId)continue;
   if(x.sizeH||x.sizeW||x.sizeM||x.internalNote)
    rel.push({h:x.sizeH||'',w:x.sizeW||'',m:x.sizeM||'',note:x.internalNote||'',at:x.updatedAt||0})}}
 rel.sort((a,b)=>b.at-a.at);
 const seen=new Set(),out=[];
 for(const r of rel){const k=[r.h,r.w,r.m,r.note].join('|');
  if(seen.has(k))continue;seen.add(k);out.push(r);if(out.length>=4)break}
 return out}
function suggHtml(sid,did){const list=sizeSugg(sid,did);
 const locked=sess(sid).status==='locked';
 if(!list.length||locked)return'';
 return '<div class="chips">'+list.map((r,i)=>{
  const size=[r.h,r.w,r.m].filter(Boolean).join('×');
  const lbl=(size||'')+(r.note?(size?' · ':'')+esc(r.note.slice(0,20))+(r.note.length>20?'…':''):'');
  return `<button class="chip" onclick="applySugg('${sid}','${did}',${i})">↺ ${lbl}</button>`}).join('')+'</div>'}
function applySugg(sid,did,i){const r=sizeSugg(sid,did)[i];if(!r)return;
 const d=dGet(sid,did);
 d.sizeH=r.h;d.sizeW=r.w;d.sizeM=r.m;
 if(r.note&&!d.internalNote)d.internalNote=r.note;
 d.updatedAt=now();markDirty();
 const set=(id,v)=>{const f=document.getElementById(id);if(f)f.value=v};
 set('d_sh',d.sizeH);set('d_sw',d.sizeW);set('d_sm',d.sizeM);set('d_inote',d.internalNote)}
/* --- stepper + szint gyorsgomb --- */
function qtyStep(sid,did,n){const d=dGet(sid,did);
 d.qty=Math.max(1,(Number(d.qty)||1)+n);d.updatedAt=now();markDirty();
 const f=document.getElementById('d_qty');if(f)f.value=d.qty}
function setLevel(sid,did,n){const d=dGet(sid,did);
 d.level=String(n);if(d.pre)d.pre.level=false;d.updatedAt=now();markDirty();
 const f=document.getElementById('d_level');if(f){f.value=n;f.style.color=''}}

/* ============ INDÍTÁS ============ */
function idbFallback(){const mem={kv:new Map(),photos:new Map()};
 idb.get=(st,k)=>Promise.resolve(mem[st].get(k));
 idb.set=(st,k,v)=>{mem[st].set(k,v);return Promise.resolve()};
 idb.del=(st,k)=>{mem[st].delete(k);return Promise.resolve()};
 idb.keys=st=>Promise.resolve([...mem[st].keys()]);
 setTimeout(()=>{const b=document.createElement('div');
  b.style.cssText='position:fixed;bottom:0;left:0;right:0;z-index:999;background:#7A5900;color:#fff;padding:8px 12px;font-size:12px;text-align:center';
  b.textContent='Figyelem: az adattárolás nem érhető el ezen a böngészőn (privát/inkognitó mód?). Az adatok bezáráskor elvesznek!';
  document.body.appendChild(b)},500)}
(async function(){
 if(!licOk()){licBlock();return}
 try{await Promise.race([idb.open(),new Promise((_,rej)=>setTimeout(()=>rej(new Error('IndexedDB időtúllépés')),4000))])}
 catch(e){idbFallback()}
 try{await loadState()}catch(e){S=freshState()}
 ensureBuiltinAdmin();
 /* Csak akkor próbáljuk a fiokok.json-t hálózatról húzni, ha még nincs betöltve a
  * teljes névsor (a fix admin fiókon kívül) — offline induláskor nincs várakozás. */
 if(!S.users||S.users.length<=1){try{await fetchAccounts()}catch(e){}}
 try{const suid=lsGet('rsz_uid');CU=(S.users||[]).find(u=>u.id===suid&&u.active!==false)||null}catch(e){}
 try{await dbxHandleRedirect()}catch(e){}
 if('serviceWorker'in navigator){try{navigator.serviceWorker.register('sw.js').catch(()=>{})}catch(e){}}
 render()
})().catch(e=>{window.onerror((e&&e.stack)||String(e),'inditas',0);
 try{if(!S)S=freshState();render()}catch(_){}});
</script>
